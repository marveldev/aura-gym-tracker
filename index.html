<!doctype html>
<html lang="en" class="dark">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Aura Dashboard</title>
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
			rel="stylesheet" />
		<script src="https://cdn.jsdelivr.net/npm/tailwindcss-cdn@3.4.10/tailwindcss.js"></script>
		<script src="https://unpkg.com/@phosphor-icons/web"></script>
		<link rel="stylesheet" href="styles/main.css" />
		<style type="text/tailwindcss" data-teda="tailwind-apply">
			@layer components {
				.app-container {
					@apply flex h-screen overflow-hidden bg-[hsl(var(--bg))] text-[hsl(var(--fg))];
				}
				.sidebar {
					@apply w-64 border-r border-[hsl(var(--border))] bg-[hsl(var(--surface))] hidden md:flex flex-col justify-between shrink-0;
				}
				.mobile-nav {
					@apply fixed bottom-0 left-0 w-full border-t border-[hsl(var(--border))] bg-[hsl(var(--surface))]/90 backdrop-blur-md flex md:hidden justify-around py-3 z-50;
				}
				.main-content {
					@apply flex-1 overflow-y-auto p-6 md:p-10 pb-24 md:pb-10 relative;
				}
				.nav-link {
					@apply flex items-center gap-3 px-4 py-3 rounded-lg text-[hsl(var(--muted))] font-medium transition-colors hover:bg-[hsl(var(--bg))] hover:text-[hsl(var(--fg))];
				}
				.nav-link.active {
					@apply bg-[hsl(var(--primary))]/10 text-[hsl(var(--primary))] font-semibold;
				}
				.mobile-link {
					@apply flex flex-col items-center gap-1 text-[hsl(var(--muted))] text-xs;
				}
				.mobile-link.active {
					@apply text-[hsl(var(--primary))];
				}
				.card {
					@apply bg-[hsl(var(--surface))] border border-[hsl(var(--border))] rounded-2xl shadow-sm;
				}
				.btn {
					@apply inline-flex items-center justify-center gap-2 rounded-lg font-medium transition-all focus:outline-none focus:ring-2 focus:ring-[hsl(var(--primary))]/50;
				}
				.btn-primary {
					@apply bg-[hsl(var(--primary))] text-[hsl(var(--primary-fg))] hover:bg-[hsl(var(--primary-hover))] px-4 py-2 shadow-md shadow-[hsl(var(--primary))]/20;
				}
				.btn-outline {
					@apply inline-flex items-center justify-center rounded-full border border-[hsl(var(--border))] bg-transparent text-[hsl(var(--fg))] px-8 py-4 font-semibold transition-all hover:bg-[hsl(var(--surface))] hover:border-[hsl(var(--muted))];
				}
				.text-gradient {
					@apply bg-clip-text text-transparent bg-gradient-to-r from-[hsl(var(--primary))] to-amber-400;
				}
				.btn-secondary {
					@apply bg-[hsl(var(--bg))] border border-[hsl(var(--border))] text-[hsl(var(--fg))] hover:border-[hsl(var(--muted))] px-4 py-2;
				}
				.input-field {
					@apply w-full bg-[hsl(var(--bg))] border border-[hsl(var(--border))] rounded-lg px-4 py-2 text-[hsl(var(--fg))] focus:outline-none focus:border-[hsl(var(--primary))] transition-colors;
				}
				.label {
					@apply block text-sm font-medium text-[hsl(var(--muted))] mb-1.5;
				}
			}
		</style>
	</head>
	<body class="selection:bg-[hsl(var(--primary))] selection:text-white">
		<div id="root"></div>
		<script type="module" src="/src/main.jsx"></script>
	</body>
</html>
