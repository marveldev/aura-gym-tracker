<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aura Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/tailwindcss-cdn@3.4.10/tailwindcss.js"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="styles/main.css">
  <style type="text/tailwindcss" data-teda="tailwind-apply">
    @layer components {
      .app-container { @apply flex h-screen overflow-hidden bg-[hsl(var(--bg))] text-[hsl(var(--fg))]; }
      .sidebar { @apply w-64 border-r border-[hsl(var(--border))] bg-[hsl(var(--surface))] hidden md:flex flex-col justify-between shrink-0; }
      .mobile-nav { @apply fixed bottom-0 left-0 w-full border-t border-[hsl(var(--border))] bg-[hsl(var(--surface))]/90 backdrop-blur-md flex md:hidden justify-around py-3 z-50; }
      .main-content { @apply flex-1 overflow-y-auto p-6 md:p-10 pb-24 md:pb-10 relative; }
      .nav-link { @apply flex items-center gap-3 px-4 py-3 rounded-lg text-[hsl(var(--muted))] font-medium transition-colors hover:bg-[hsl(var(--bg))] hover:text-[hsl(var(--fg))]; }
      .nav-link.active { @apply bg-[hsl(var(--primary))]/10 text-[hsl(var(--primary))] font-semibold; }
      .mobile-link { @apply flex flex-col items-center gap-1 text-[hsl(var(--muted))] text-xs; }
      .mobile-link.active { @apply text-[hsl(var(--primary))]; }
      
      .card { @apply bg-[hsl(var(--surface))] border border-[hsl(var(--border))] rounded-2xl shadow-sm; }
      .btn { @apply inline-flex items-center justify-center gap-2 rounded-lg font-medium transition-all focus:outline-none focus:ring-2 focus:ring-[hsl(var(--primary))]/50; }
      .btn-primary { @apply bg-[hsl(var(--primary))] text-[hsl(var(--primary-fg))] hover:bg-[hsl(var(--primary-hover))] px-4 py-2 shadow-md shadow-[hsl(var(--primary))]/20; }
      .btn-secondary { @apply bg-[hsl(var(--bg))] border border-[hsl(var(--border))] text-[hsl(var(--fg))] hover:border-[hsl(var(--muted))] px-4 py-2; }
      .btn-danger { @apply bg-[hsl(var(--danger))]/10 text-[hsl(var(--danger))] hover:bg-[hsl(var(--danger))]/20 px-4 py-2; }
      
      .input-field { @apply w-full bg-[hsl(var(--bg))] border border-[hsl(var(--border))] rounded-lg px-4 py-2 text-[hsl(var(--fg))] focus:outline-none focus:border-[hsl(var(--primary))] transition-colors; }
      .label { @apply block text-sm font-medium text-[hsl(var(--muted))] mb-1.5; }
    }
  </style>
</head>
<body class="app-container selection:bg-[hsl(var(--primary))] selection:text-white">

  <!-- Desktop Sidebar -->
  <aside class="sidebar">
    <div class="p-6">
      <a href="index.html" class="flex items-center gap-3 mb-12">
        <img src="logo.svg" alt="Aura Logo" class="w-8 h-8">
        <span class="text-xl font-bold tracking-tight text-[hsl(var(--fg))]">Aura</span>
      </a>
      <nav class="flex flex-col gap-2">
        <button class="nav-link active" data-target="dashboard">
          <i class="ph ph-squares-four text-xl"></i> Dashboard
        </button>
        <button class="nav-link" data-target="history">
          <i class="ph ph-clock-counter-clockwise text-xl"></i> History
        </button>
        <button class="nav-link" data-target="analytics">
          <i class="ph ph-chart-line-up text-xl"></i> Analytics
        </button>
      </nav>
    </div>
    <div class="p-6 border-t border-[hsl(var(--border))]">
      <button id="themeToggle" class="nav-link w-full justify-between">
        <span class="flex items-center gap-3"><i class="ph ph-moon text-xl"></i> Theme</span>
      </button>
    </div>
  </aside>

  <!-- Mobile Nav -->
  <nav class="mobile-nav">
    <button class="mobile-link active" data-target="dashboard">
      <i class="ph ph-squares-four text-2xl"></i>
      <span>Dashboard</span>
    </button>
    <button class="mobile-link" data-target="history">
      <i class="ph ph-clock-counter-clockwise text-2xl"></i>
      <span>History</span>
    </button>
    <button class="mobile-link" data-target="analytics">
      <i class="ph ph-chart-line-up text-2xl"></i>
      <span>Analytics</span>
    </button>
    <button class="mobile-link" id="mobileThemeToggle">
      <i class="ph ph-moon text-2xl"></i>
      <span>Theme</span>
    </button>
  </nav>

  <!-- Main Content Area -->
  <main class="main-content">
    
    <!-- VIEW: Dashboard -->
    <div id="view-dashboard" class="view-section animate-fade-in">
      <header class="flex justify-between items-center mb-8">
        <div>
          <h1 class="text-3xl font-bold tracking-tight">Overview</h1>
          <p class="text-[hsl(var(--muted))] mt-1" id="dateGreeting">Loading...</p>
        </div>
        <button class="btn btn-primary" onclick="App.UI.openWorkoutModal()">
          <i class="ph ph-plus-bold"></i> <span class="hidden sm:inline">Log Workout</span>
        </button>
      </header>

      <!-- Stats Grid -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10" id="dashboardStats">
        <!-- Injected via JS -->
      </div>

      <!-- Recent Activity -->
      <div>
        <div class="flex justify-between items-center mb-6">
          <h2 class="text-xl font-bold">Recent Activity</h2>
          <button class="text-[hsl(var(--primary))] text-sm font-medium hover:underline" onclick="$('[data-target=history]').click()">View All</button>
        </div>
        <div class="grid grid-cols-1 xl:grid-cols-2 gap-6" id="recentActivityList">
          <!-- Injected via JS -->
        </div>
      </div>
    </div>

    <!-- VIEW: History -->
    <div id="view-history" class="view-section animate-fade-in hidden">
      <header class="flex justify-between items-center mb-8">
        <div>
          <h1 class="text-3xl font-bold tracking-tight">Workout History</h1>
          <p class="text-[hsl(var(--muted))] mt-1">All your logged sessions.</p>
        </div>
        <button class="btn btn-primary" onclick="App.UI.openWorkoutModal()">
          <i class="ph ph-plus-bold"></i> Log
        </button>
      </header>
      
      <div class="space-y-4" id="historyList">
        <!-- Injected via JS -->
      </div>
    </div>

    <!-- VIEW: Analytics -->
    <div id="view-analytics" class="view-section animate-fade-in hidden">
      <header class="mb-8">
        <h1 class="text-3xl font-bold tracking-tight">Analytics</h1>
        <p class="text-[hsl(var(--muted))] mt-1">Track your progressive overload.</p>
      </header>
      
      <div class="card p-6 mb-8">
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8">
          <h3 class="text-lg font-bold">Weight Progression</h3>
          <select id="chartExerciseSelect" class="input-field w-full sm:w-64">
            <option value="">Select Exercise...</option>
          </select>
        </div>
        <div class="relative w-full h-[400px]">
          <canvas id="progressChart"></canvas>
        </div>
      </div>
    </div>

  </main>

  <!-- MODAL: Log Workout -->
  <div id="workoutModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center">
    <div class="absolute inset-0 bg-black/60 backdrop-blur-sm modal-overlay" onclick="App.UI.closeWorkoutModal()"></div>
    <div class="card w-full max-w-2xl max-h-[90vh] flex flex-col relative z-10 m-4 shadow-2xl animate-slide-up">
      
      <div class="flex justify-between items-center p-6 border-b border-[hsl(var(--border))]">
        <h2 class="text-2xl font-bold">Log Session</h2>
        <button onclick="App.UI.closeWorkoutModal()" class="p-2 text-[hsl(var(--muted))] hover:text-[hsl(var(--fg))] transition-colors rounded-lg hover:bg-[hsl(var(--bg))]">
          <i class="ph ph-x text-xl"></i>
        </button>
      </div>

      <div class="p-6 overflow-y-auto flex-1">
        <form id="workoutForm" class="space-y-8">
          
          <!-- Meta info -->
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
            <div>
              <label class="label">Date</label>
              <input type="date" id="workoutDate" class="input-field" required>
            </div>
            <div>
              <label class="label">Primary Focus</label>
              <select id="workoutFocus" class="input-field" required>
                <option value="Chest">Chest</option>
                <option value="Back">Back</option>
                <option value="Legs">Legs</option>
                <option value="Shoulders">Shoulders</option>
                <option value="Arms">Arms</option>
                <option value="Core">Core</option>
                <option value="Full Body">Full Body</option>
              </select>
            </div>
          </div>

          <!-- Exercises List container -->
          <div id="exercisesContainer" class="space-y-8">
             <!-- Dynamic Exercise Blocks injected here -->
          </div>

          <button type="button" onclick="App.UI.addExerciseBlock()" class="w-full py-4 border-2 border-dashed border-[hsl(var(--border))] rounded-xl text-[hsl(var(--muted))] hover:text-[hsl(var(--primary))] hover:border-[hsl(var(--primary))]/50 transition-colors font-medium flex items-center justify-center gap-2">
            <i class="ph ph-plus-circle text-xl"></i> Add Exercise
          </button>

        </form>
      </div>

      <div class="p-6 border-t border-[hsl(var(--border))] flex justify-end gap-3 bg-[hsl(var(--bg))]/50 rounded-b-2xl">
        <button class="btn btn-secondary" onclick="App.UI.closeWorkoutModal()">Cancel</button>
        <button class="btn btn-primary" onclick="App.UI.saveWorkout()">Save Workout</button>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toastContainer" class="fixed bottom-20 md:bottom-10 right-4 z-[200] flex flex-col gap-3 pointer-events-none"></div>

  <!-- Scripts execution in strict order -->
  <script src="scripts/helpers.js"></script>
  <script src="scripts/data.js"></script>
  <script src="scripts/ui.js"></script>
  <script src="scripts/main.js"></script>
</body>
</html>
